<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — LuxeoDrive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">

            <div class="logo">
                <svg width="38" height="38" viewBox="0 0 44 44" fill="none" style="display:block;margin:0 auto 8px;">
                    <rect x="1" y="1" width="42" height="42" rx="4" stroke="url(#gForm)" stroke-width="1"/>
                    <rect x="5" y="5" width="34" height="34" rx="2" stroke="rgba(200,169,110,0.2)" stroke-width="0.5" fill="rgba(200,169,110,0.04)"/>
                    <text x="22" y="30" font-family="Cormorant Garamond,Georgia,serif" font-size="22" font-weight="600" text-anchor="middle" fill="url(#gForm)">LD</text>
                    <defs><linearGradient id="gForm" x1="1" y1="1" x2="43" y2="43"><stop offset="0%" stop-color="#c8a96b"/><stop offset="100%" stop-color="#f5d38a"/></linearGradient></defs>
                </svg>
                LuxeoDrive
            </div>

            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez-nous et réservez votre voiture</p>

            <div id="message" class="message hidden"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" id="confirm" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">S'inscrire</button>
            </form>

            <p class="link">Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const msg = document.getElementById('message');

            if (password !== confirm) {
                msg.className = 'message error';
                msg.textContent = '❌ Les mots de passe ne correspondent pas';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    msg.className = 'message success';
                    msg.textContent = '✅ Compte créé ! Redirection...';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    msg.className = 'message error';
                    msg.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = '❌ Erreur de connexion au serveur';
            }
        });
    </script>
</body>
</html>
