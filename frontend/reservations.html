<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Réservations — LuxeoDrive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar"> <div class="nav-logo">
  <svg width="32" height="32" viewBox="0 0 44 44" fill="none">
    <rect x="1" y="1" width="42" height="42" rx="4" stroke="url(#gNav)" stroke-width="1"/>
    <rect x="5" y="5" width="34" height="34" rx="2" stroke="rgba(200,169,110,0.2)" stroke-width="0.5" fill="rgba(200,169,110,0.04)"/>
    <text x="22" y="30" font-family="Cormorant Garamond,Georgia,serif" font-size="22" font-weight="600" text-anchor="middle" fill="url(#gNav)">LD</text>
    <defs><linearGradient id="gNav" x1="1" y1="1" x2="43" y2="43"><stop offset="0%" stop-color="#c8a96b"/><stop offset="100%" stop-color="#f5d38a"/></linearGradient></defs>
  </svg>
  LuxeoDrive
</div>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <span id="userInfo"></span>
            <a href="#" id="logoutBtn" class="btn-nav">Déconnexion</a>
        </div>
       
    </nav>

    <div class="section">
        <h2 class="section-title">Mes Réservations</h2>

        <!-- Formulaire réservation -->
        <div id="formReservation" class="form-reservation hidden">
            <h3>Nouvelle Réservation</h3>
            <div id="voitureSelectionnee"></div>
            <div class="form-group">
                <label>Date de début</label>
                <input type="date" id="dateDebut">
            </div>
            <div class="form-group">
                <label>Date de fin</label>
                <input type="date" id="dateFin">
            </div>
            <div id="prixEstime"></div>
            <div id="msgReservation" class="message hidden"></div>
            <button class="btn-primary" onclick="confirmerReservation()">
                Confirmer la réservation
            </button>
            <button class="btn-annuler" onclick="annulerForm()">Annuler</button>
        </div>

        <!-- Liste réservations -->
        <div id="reservationsList"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (!user) window.location.href = 'login.html';

        document.getElementById('userInfo').textContent = '👤 ' + user.nom;
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        // Vérifier si vient de index.html avec une voiture
        const params = new URLSearchParams(window.location.search);
        const voitureId = params.get('voiture');

        if (voitureId) {
            chargerVoiture(voitureId);
        }

        async function chargerVoiture(id) {
            const response = await fetch(`http://localhost:3000/api/voitures/${id}`);
            const voiture = await response.json();

            document.getElementById('formReservation').classList.remove('hidden');
            document.getElementById('voitureSelectionnee').innerHTML = `
                <div class="voiture-selected">
                    <h4>🚗 ${voiture.marque} ${voiture.modele}</h4>
                    <p>💰 ${voiture.prix_jour} MAD/jour</p>
                </div>
            `;

            // Calculer prix estimé
            document.getElementById('dateFin').addEventListener('change', () => {
                const debut = new Date(document.getElementById('dateDebut').value);
                const fin = new Date(document.getElementById('dateFin').value);
                if (debut && fin && fin > debut) {
                    const jours = Math.ceil((fin - debut) / (1000 * 60 * 60 * 24));
                    const total = jours * voiture.prix_jour;
                    document.getElementById('prixEstime').innerHTML = 
                        `<p class="prix-total">💰 Total estimé : <strong>${total} MAD</strong> (${jours} jours)</p>`;
                }
            });
        }

        async function confirmerReservation() {
            const dateDebut = document.getElementById('dateDebut').value;
            const dateFin = document.getElementById('dateFin').value;
            const msg = document.getElementById('msgReservation');

            if (!dateDebut || !dateFin) {
                msg.className = 'message error';
                msg.textContent = '❌ Choisissez les dates !';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/reservations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        user_id: user.id,
                        voiture_id: voitureId,
                        date_debut: dateDebut,
                        date_fin: dateFin
                    })
                });
                const data = await response.json();

                if (response.ok) {
                    msg.className = 'message success';
                    msg.textContent = `✅ Réservation confirmée ! Total : ${data.prix_total} MAD`;
                    setTimeout(() => {
                        document.getElementById('formReservation').classList.add('hidden');
                        chargerReservations();
                    }, 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = '❌ Erreur serveur';
            }
        }

        function annulerForm() {
            document.getElementById('formReservation').classList.add('hidden');
            window.history.pushState({}, '', 'reservations.html');
        }

        async function chargerReservations() {
            try {
                const response = await fetch(
                    `http://localhost:3000/api/reservations/user/${user.id}`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                const reservations = await response.json();
                const list = document.getElementById('reservationsList');

                if (reservations.length === 0) {
                    list.innerHTML = '<p class="loading">Aucune réservation pour le moment</p>';
                    return;
                }

                list.innerHTML = reservations.map(r => `
                    <div class="reservation-card">
                        <div class="res-info">
                            <h3>🚗 ${r.marque} ${r.modele}</h3>
                            <p>📅 Du ${r.date_debut.split('T')[0]} au ${r.date_fin.split('T')[0]}</p>
                            <p>💰 Total : ${r.prix_total} MAD</p>
                            <span class="statut ${r.statut}">${r.statut}</span>
                        </div>
                        ${r.statut === 'active' ? `
                            <button class="btn-annuler" onclick="annulerReservation(${r.id})">
                                Annuler
                            </button>
                        ` : ''}
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function annulerReservation(id) {
            if (!confirm('Voulez-vous vraiment annuler cette réservation ?')) return;

            const response = await fetch(`http://localhost:3000/api/reservations/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (response.ok) {
                alert('✅ ' + data.message);
                chargerReservations();
            }
        }

        chargerReservations();
    </script>
</body>
</html>
